apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: coredns
spec:
  interval: 24h
  url: https://coredns.github.io/helm


---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coredns
spec:
  interval: 5m
  chart:
    spec:
      chart: coredns
      version: 1.45.0
      sourceRef:
        kind: HelmRepository
        name: coredns
      interval: 5m
  values:
    isClusterService: false
    prometheus:
      service:
        enabled: true
    service:
      loadBalancerIP: "192.168.0.202"
    serviceType: LoadBalancer
    servers:
      - zones:
        - zone: .
        port: 53
        plugins:
          - name: errors
          - name: health
            configBlock: |-
              lameduck 5s
          - name: ready
          - name: prometheus
            parameters: 0.0.0.0:9153
          - name: any
          - name: bufsize
            parameters: 1232
          - name: cache
            parameters: 30
          - name: loop
          - name: reload
          - name: loadbalance
          - name: forward
            parameters: . tls://1.1.1.1
            configBlock: |-
              tls_servername cloudflare-dns.com
              health_check 5s
            # Hairpinning is not a concern: tailnet devices resolve immortalkeep.com
            # via Headscale split DNS → CoreDNS, infrastructure VMs use CoreDNS
            # directly, and LAN devices use CoreDNS via router DHCP (primary) with
            # Cloudflare (secondary) as fallback.
      - zones:
        - zone: immortalkeep.com
        port: 53
        plugins:
          - name: errors
          - name: log
          - name: health
            configBlock: |-
              lameduck 5s
          - name: file
            parameters: /etc/coredns/db.immortalkeep.com
          - name: ready
          - name: prometheus
            parameters: 0.0.0.0:9153
          - name: reload
    zoneFiles:
      - filename: db.immortalkeep.com
        domain: immortalkeep.com
        contents: |-
          $ORIGIN immortalkeep.com.
          $TTL 1h

          ; --- SOA & NS ---
          @                       IN  SOA  ns.immortalkeep.com. hostmaster.immortalkeep.com. (
                                               2026041101 ; serial (YYYYMMDDNN)
                                               86400      ; refresh (1d)
                                               7200       ; retry (2h)
                                               2419200    ; expire (4w)
                                               3600 )     ; negative cache TTL (1h)
          @                       IN  NS   ns.immortalkeep.com.

          ; --- Infrastructure hosts ---
          vulcanus                IN  A    192.168.0.111
          proxmox-backup-server   IN  A    192.168.0.107
          fileserver              IN  A    192.168.0.105
          ns                      IN  A    192.168.0.202  ; CoreDNS

          ; --- Kubernetes nodes ---
          piraeus-control-plane-0 IN  A    192.168.0.190
          piraeus-worker-0        IN  A    192.168.0.195
          piraeus-worker-1        IN  A    192.168.0.196
          piraeus-api             IN  A    192.168.0.200  ; cluster VIP

          ; --- Kubernetes services (via ingress) ---
          ; Wildcard routes all subdomains to internal ingress controller.
          ; Explicit records above take precedence over the wildcard.
          @                       IN  A    192.168.0.203
          *.immortalkeep.com.     IN  A    192.168.0.203

          ; --- MetalLB service IPs (for reference) ---
          ; 192.168.0.201 = ingress-nginx-external
          ; 192.168.0.202 = CoreDNS (this service)
          ; 192.168.0.203 = ingress-nginx-internal
          ;
          ; --- Router DHCP DNS settings ---
          ; Primary: 192.168.0.202 (CoreDNS)
          ; Secondary: 1.1.1.1 (Cloudflare, failover when CoreDNS/cluster is down)
