apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: automatic-ripping-machine
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure
  interval: 10m0s
  retryInterval: 1m0s
  path: ./kubernetes/apps/automatic-ripping-machine
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
