apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: speedtest-tracker
spec:
  image: alexjustesen/speedtest-tracker
  interval: 15m0s


---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: speedtest-tracker
spec:
  imageRepositoryRef:
    name: speedtest-tracker
  filterTags:
    pattern: '^v(?P<version>[0-9]+\.[0-9]+\.[0-9]+)$'
    extract: '$version'
  policy:
    semver:
      range: '>=0.21.0'
