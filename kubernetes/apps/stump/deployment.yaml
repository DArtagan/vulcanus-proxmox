apiVersion: apps/v1
kind: Deployment
metadata:
  name: stump
  labels:
    app: stump
spec:
  selector:
    matchLabels:
      app: stump
  template:
    metadata:
      labels:
        app: stump
    spec:
      containers:
        - name: stump
          image: aaronleopold/stump:0.1.3 # {"$imagepolicy": "apps:stump"}
          env:
            - name: STUMP_TRUST_PROXY_HEADERS
              value: "true"
            - name: ENABLE_KOREADER_SYNC
              value: "true"
            # Non-root security hardening — not required for functionality
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: STUMP_PORT
              value: "10801"
          ports:
            - containerPort: 10801
          volumeMounts:
            - mountPath: /config
              name: config
            - mountPath: /books
              name: books
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: stump-config-pvc
        - name: books
          persistentVolumeClaim:
            claimName: books-pvc
