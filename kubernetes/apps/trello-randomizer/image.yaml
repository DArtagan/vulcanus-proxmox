apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: trello-randomizer
spec:
  image: ghcr.io/dartagan/trello-randomizer
  interval: 15m0s


---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: trello-randomizer
spec:
  imageRepositoryRef:
    name: trello-randomizer
  filterTags:
    pattern: '^\d{14}$'
  policy:
    alphabetical:
      order: asc
