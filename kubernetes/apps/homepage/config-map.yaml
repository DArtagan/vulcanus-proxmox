kind: ConfigMap
apiVersion: v1
metadata:
  name: homepage
data:
  bookmarks.yaml:
  custom.css:
  custom.js:
  docker.yaml:
  kubernetes.yaml:
  settings.yaml: |
    title: Vulcanus
    logpath: /app/logs
    theme: dark
    color: slate
    headerStyle: clean
    hideVersion: true
    disableUpdateCheck: true
    layout:
      Media:
        columns: 4
      Ripping:
        columns: 3
      Productivity:
        columns: 3
      Network:
        columns: 3
      Cluster:
        columns: 3
  widgets.yaml: |
    - datetime:
        text_size: l
        format:
          timeStyle: short
          dateStyle: long
          hour12: true
    - search:
        provider: google
        target: _blank
  services.yaml: |
    - Media:
      - Plex:
          href: https://plex.immortalkeep.com
          description: Media server
          icon: plex
          siteMonitor: http://plex.apps.svc.cluster.local:32400/identity
          widget:
            type: plex
            url: http://plex.apps.svc.cluster.local:32400
            key: "{{HOMEPAGE_VAR_PLEX_KEY}}"
      - Photoprism:
          href: https://photoprism.immortalkeep.com
          description: Photo management
          icon: photoprism
          siteMonitor: http://photoprism.apps.svc.cluster.local:2342
          widget:
            type: photoprism
            url: http://photoprism.apps.svc.cluster.local:2342
            key: "{{HOMEPAGE_VAR_PHOTOPRISM_KEY}}"
      - Podbook:
          href: https://podbook.immortalkeep.com
          description: Podcast reader
          icon: mdi-book-music
          siteMonitor: http://podbook-rebound.apps.svc.cluster.local:8000
      - Botamusique:
          href: https://botamusique.immortalkeep.com
          description: Mumble music bot
          icon: mdi-music
    - Ripping:
      - YouTube-dl:
          href: https://youtube.immortalkeep.com
          description: Video downloader
          icon: youtube
          siteMonitor: http://youtube-dl.apps.svc.cluster.local:8080
      - Automatic Ripping Machine:
          href: https://arm.immortalkeep.com
          description: Disc ripping automation
          icon: si-openmediavault
          siteMonitor: http://automatic-ripping-machine.automatic-ripping-machine.svc.cluster.local:8080
      - Filebot:
          href: https://filebot.immortalkeep.com
          description: Media file organizer
          icon: filebot
          siteMonitor: http://filebot.apps.svc.cluster.local:5452
      - Media Toolkit:
          href: https://media-toolkit.immortalkeep.com
          description: Web-based media desktop
          icon: webtop
          siteMonitor: http://media-toolkit-webtop.apps.svc.cluster.local:3000
      - Podgrab:
          href: https://podgrab.immortalkeep.com
          description: Podcast downloader
          icon: podgrab
          siteMonitor: http://podgrab.apps.svc.cluster.local:8080
    - Productivity:
      - Linkding:
          href: https://linkding.immortalkeep.com
          description: Bookmark manager
          icon: linkding
          siteMonitor: http://linkding.apps.svc.cluster.local:9090
      - Syncthing:
          href: https://syncthing.immortalkeep.com
          description: File synchronization
          icon: syncthing
          siteMonitor: http://syncthing.apps.svc.cluster.local:8384
      - Trello Randomizer:
          href: https://trello-randomizer.immortalkeep.com
          description: Random card picker
          icon: trello
          siteMonitor: http://trello-randomizer.apps.svc.cluster.local:8080
    - Network:
      - Headplane:
          href: https://headplane.immortalkeep.com
          description: VPN management
          icon: headscale
          siteMonitor: http://headscale.apps.svc.cluster.local:3000
      - Cloudflare Gateway:
          href: https://dns.immortalkeep.com
          description: DNS filtering
          icon: cloudflare
      - Speedtest Tracker:
          href: https://speedtest.immortalkeep.com
          description: Internet speed monitoring
          icon: speedtest-tracker
          siteMonitor: http://speedtest-tracker.apps.svc.cluster.local:80
          widget:
            type: speedtest
            url: http://speedtest-tracker.apps.svc.cluster.local:80
            fields: ["ping", "download", "upload"]
    - Cluster:
      - Grafana:
          href: https://grafana.immortalkeep.com
          description: Metrics dashboards
          icon: grafana
          siteMonitor: http://kube-prometheus-grafana.infrastructure.svc.cluster.local:80
          widget:
            type: grafana
            version: 2
            url: http://kube-prometheus-grafana.infrastructure.svc.cluster.local:80
            username: "{{HOMEPAGE_VAR_GRAFANA_USERNAME}}"
            password: "{{HOMEPAGE_VAR_GRAFANA_PASSWORD}}"
      - Prometheus:
          href: https://prometheus.immortalkeep.com
          description: Metrics database
          icon: prometheus
          siteMonitor: http://kube-prometheus-kube-prome-prometheus.infrastructure.svc.cluster.local:9090
          widget:
            type: prometheus
            url: http://kube-prometheus-kube-prome-prometheus.infrastructure.svc.cluster.local:9090
      - Proxmox Backup Server:
          href: https://192.168.0.107:8007
          description: Backup server
          icon: proxmox
          siteMonitor: https://192.168.0.107:8007
          widget:
            type: proxmoxbackupserver
            url: https://192.168.0.107:8007
            username: "{{HOMEPAGE_VAR_PBS_TOKEN_ID}}"
            password: "{{HOMEPAGE_VAR_PBS_TOKEN_SECRET}}"
            allowInsecure: true
      - Kubernetes:
          href: https://kubernetes.immortalkeep.com
          description: Cluster dashboard
          icon: kubernetes-dashboard
          siteMonitor: https://kubernetes-dashboard-kong-proxy.infrastructure.svc.cluster.local:443
